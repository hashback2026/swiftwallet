<!DOCTYPE html>
<html>
<head>
    <title>SwiftWallet Bulk STK</title>
</head>
<body>

<h2>Bulk STK Push</h2>

<label>Phone Numbers (one per line)</label><br>
<textarea id="numbers" rows="8" cols="40"></textarea><br>

<label>Amount</label><br>
<input type="number" id="amount"><br>

<label>Reference</label><br>
<input type="text" id="reference" placeholder="ORDER-12345"><br><br>

<button onclick="sendSTK()">Send STK Push</button>

<pre id="result"></pre>

<script>
async function sendSTK() {
    const numbers = document.getElementById("numbers").value;
    const amount = document.getElementById("amount").value;
    const reference = document.getElementById("reference").value;

    const res = await fetch("/send-bulk", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ numbers, amount, reference })
    });

    const data = await res.json();
    document.getElementById("result").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
